# version=RHEL10
# Basic installation parameters
cdrom
text
reboot

# System localization & time
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Network configuration
network --bootproto=dhcp --activate --onboot=on --hostname=rhel10-server.localdomain

# Security & Authentication
rootpw --lock
# Provide your generated SHA-512 hash here
user --name=lab_admin --password=$6$test$zW0OdEUeeqYAEUmnXZ3CcdTnF867qiC1306IvgaUfV7MqmQ0lBIaxFBkpxpaEqO5eLJrDe2F8PaZXYM0eTP04. --iscrypted --groups=wheel
firewall --enabled --service=ssh
selinux --enforcing

# ---------------------------------------------------------------------
# DYNAMIC STORAGE INCLUSION
# ---------------------------------------------------------------------
%include /tmp/storage.ks
# ---------------------------------------------------------------------

# Package Selection
%packages
@^graphical-server-environment
kexec-tools
sysstat
tar
wget
curl
rhc
flatpak
%end

# =====================================================================
# PRE-INSTALLATION SCRIPT (Runs BEFORE Anaconda parses storage)
# =====================================================================
%pre --interpreter=/bin/bash

# 1. DD-Safe Disk Discovery
# Strictly ignores USB buses, loopbacks, cdroms, and zram. Sorts descending by size.
store=$(lsblk -nd -o NAME,TYPE,TRAN,SIZE -b | grep -vE "loop|zram|sr|cdrom" | awk '$2=="disk" && $3!="usb" {print $1, $4}' | sort -k2,2nr | head -n1 | awk '{print $1}')

# FALLBACK: If hardware doesn't report the TRAN (transport) column correctly.
if [ -z "$store" ]; then
    store=$(lsblk -nd -o NAME,TYPE,SIZE -b | grep -vE "loop|zram|sr|cdrom" | awk '$2=="disk" {print $1, $3}' | sort -k2,2nr | head -n1 | awk '{print $1}')
fi

# FAILSAFE: Prevent Anaconda crash
if [ -z "$store" ]; then
    store="sda"
fi

# 2. Calculate dynamic swap (5% of disk, capped at 64GB)
disk_bytes=$(lsblk -b -n -d -o SIZE /dev/$store 2>/dev/null)

if [ -z "$disk_bytes" ]; then
    disk_bytes=107374182400
fi

disk_mb=$((disk_bytes / 1048576))
swapsize=$((disk_mb * 5 / 100))

if [ "$swapsize" -gt 65536 ]; then
    swapsize=65536
fi

if [ "$swapsize" -lt 2048 ]; then
    swapsize=2048
fi

# 3. Generate the storage kickstart file dynamically
echo "bootloader --append='selinux=1 audit=1' --boot-drive=$store" > /tmp/storage.ks
echo "zerombr" >> /tmp/storage.ks
echo "clearpart --all --initlabel --drives=$store" >> /tmp/storage.ks

# Boot Partitions
echo "part biosboot --fstype=biosboot --size=1 --ondisk=$store" >> /tmp/storage.ks
echo "part /boot/efi --fstype=efi --size=200 --ondisk=$store" >> /tmp/storage.ks
echo "part /boot --fstype=xfs --size=1024 --ondisk=$store --fsoptions='defaults'" >> /tmp/storage.ks

# LVM Setup
echo "part pv.01 --fstype=lvmpv --size=1 --grow --ondisk=$store" >> /tmp/storage.ks
echo "volgroup os_disk pv.01" >> /tmp/storage.ks

# Logical Volumes
echo "logvol swap --vgname=os_disk --size=${swapsize} --name=swap --fstype=swap" >> /tmp/storage.ks
echo "logvol /tmp --vgname=os_disk --name=tmp --percent=10 --fstype=xfs --fsoptions='defaults,nodev,nosuid,noexec'" >> /tmp/storage.ks
echo "logvol /var --vgname=os_disk --name=var --percent=15 --fstype=xfs --fsoptions='defaults'" >> /tmp/storage.ks
echo "logvol /var/tmp --vgname=os_disk --name=vartmp --percent=10 --fstype=xfs --fsoptions='defaults,nodev,nosuid,noexec'" >> /tmp/storage.ks
echo "logvol /var/log --vgname=os_disk --name=log --percent=10 --fstype=xfs --fsoptions='defaults,nodev,nosuid,noexec'" >> /tmp/storage.ks
echo "logvol /var/log/audit --vgname=os_disk --name=audit --percent=10 --fstype=xfs --fsoptions='defaults,nodev,nosuid,noexec'" >> /tmp/storage.ks
echo "logvol /home --vgname=os_disk --name=home --percent=15 --fstype=xfs --fsoptions='nodev,nosuid'" >> /tmp/storage.ks

# Root volume absorbs everything remaining
echo "logvol / --vgname=os_disk --name=root --size=1 --grow --fstype=xfs --fsoptions='defaults'" >> /tmp/storage.ks

%end

# =====================================================================
# POST-INSTALLATION SCRIPT
# =====================================================================
%post --log=/root/ks-post.log
echo "Installation complete. Securing environment..."

echo "lab_admin ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/lab_admin
chmod 0440 /etc/sudoers.d/lab_admin

systemctl enable chronyd
systemctl enable fstrim.timer
systemctl set-default graphical.target

# --- SYSTEM UPDATES ---
echo "Running system updates..."
dnf upgrade redhat-release -y 
dnf update -y

# --- CREATE THIRD PARTY SOFTWARE INSTALLATION SCRIPT ---
echo "Generating post-install script in /root/install_tools.sh..."

cat << 'SCRIPT_EOF' > /root/install_tools.sh
#!/bin/bash

echo "Checking internet connectivity..."
if ! ping -c 1 8.8.8.8 -W 2 >/dev/null 2>&1; then
    echo "Error: No internet connection. Please connect to the internet and try again."
    exit 1
fi

echo "Registering system to Red Hat Insights and resolving dependencies..."
rhc connect --activation-key 21117505-2fdc-49cf-830a-215cf9abfda0 --organization 17320751

echo "Configuring third-party repositories..."

# 1. Google Chrome Repo
cat << REPO_EOF > /etc/yum.repos.d/google-chrome.repo
[google-chrome]
name=google-chrome
baseurl=https://dl.google.com/linux/chrome/rpm/stable/x86_64
enabled=1
gpgcheck=1
gpgkey=https://dl.google.com/linux/linux_signing_key.pub
REPO_EOF

# 2. Microsoft VS Code Repo
rpm --import https://packages.microsoft.com/keys/microsoft.asc
cat << REPO_EOF > /etc/yum.repos.d/vscode.repo
[code]
name=Visual Studio Code
baseurl=https://packages.microsoft.com/yumrepos/vscode
enabled=1
gpgcheck=1
gpgkey=https://packages.microsoft.com/keys/microsoft.asc
REPO_EOF

echo "Installing RPM-based applications and YubiKey dependencies..."
dnf install -y google-chrome-stable code pcsc-lite

# Enable and start the Smart Card daemon so Yubico Authenticator can read the USB key
systemctl enable --now pcscd

echo "Configuring Flathub and installing Flatpak applications..."
flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
flatpak install -y flathub com.yubico.yubioath org.libreoffice.LibreOffice

echo "Installation complete! Removing this script..."
rm -f "$0"
SCRIPT_EOF

# Make the generated script executable
chmod +x /root/install_tools.sh

%end
